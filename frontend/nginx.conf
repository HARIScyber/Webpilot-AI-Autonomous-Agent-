# frontend/nginx.conf
# ====================
# Custom nginx configuration for serving a React SPA.
#
# Key setting: `try_files $uri /index.html`
# Without this, navigating to /tasks/abc in the browser would cause nginx
# to look for a file at that path and return 404 — because only index.html
# exists on disk. This rule falls back to index.html for any unknown path,
# letting React Router handle the URL on the client side.

server {
    listen 80;
    server_name _;

    # Root directory where `npm run build` output was copied
    root /usr/share/nginx/html;
    index index.html;

    # Disable access logs in Docker to reduce noise
    access_log off;

    # Compression — dramatically reduces transfer size for JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively — React adds content hashes so
    # filenames change when the content changes
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Main catch-all: serve index.html for any route React Router handles
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy "strict-origin"       always;
}
